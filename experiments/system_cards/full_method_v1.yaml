schema_version: system_card_v1
system_id: full_method_v1
cost_reporting:
  status: unreported_with_reason
  reason_code: repository_ci_stub_provider_usd_not_tracked
model:
  name: "gpt-5.4-nano"
  version: "unknown"
provider:
  id: "openai"
  endpoint: "https://api.openai.com/v1/chat/completions"
prompt_template_path: "configs/prompts/full_method_v1.json"
visible_context_fields:
  - problem_summary
  - semantic_units
  - rust_summary
  - lean_scaffold
sampling:
  temperature: 0.0
  top_p: 1.0
  max_output_tokens: 2048
num_samples_per_instance: 3
selection_rule: "first_parseable_json_object"
post_processing_pipeline:
  - "strip_markdown_fences"
  - "parse_json_obligations"
  - "normalize_obligation_shape"
  - "cta_schema_validate_results_bundle"
token_budget:
  max_context_tokens: 18000
  max_output_tokens: 2048
estimated_cost_usd_per_1k_instances: null
runtime_notes: "Full structured context; intended upper bound on faithful specification transfer. Highest token footprint of the four baselines."
output_schema: "results_bundle.schema_v1"
reference_obligations_visible: false
scaffold_visible: true
notes: "Estimated cost field is intentionally null (not captured in-repo)."
run_manifest_linkage: "See `experiments/run_manifests/` for per-wave provider metadata when published."
