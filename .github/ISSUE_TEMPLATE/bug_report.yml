name: Bug report
description: Tooling bug (Rust CLI, validation, CI)
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Do not** paste API keys, `.env` contents, or private model outputs.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Commands, inputs, and observed output.
    validations:
      required: true
  - type: input
    id: rust
    attributes:
      label: Rust version
      placeholder: e.g. 1.88.0
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Windows 11, Ubuntu 22.04
