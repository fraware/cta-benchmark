name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
          components: "rustfmt,clippy"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --no-deps

      - name: cargo test
        run: cargo test --workspace --all-targets

      - name: cargo test --doc
        run: cargo test --workspace --doc

      - name: cta validate schemas
        run: cargo run -p cta_cli --quiet -- validate schemas

      - name: cta validate benchmark v0.1
        run: cargo run -p cta_cli --quiet -- validate benchmark --version v0.1 --release

      - name: cta verify review packets (v0.2 committed tree)
        run: |
          cargo run -p cta_cli --quiet -- annotate verify-review-packets \
            --benchmark-version v0.2 \
            --packets-root benchmark/v0.2/annotation/review_packets \
            --schema schemas/review_packet.schema.json \
            --out /tmp/cta_verify_review_packets_v02.json

      - name: cta refresh lean-check v0.2 (strict M1 gate)
        run: |
          cargo run -p cta_cli --quiet -- annotate refresh-lean-check \
            --benchmark-version v0.2 \
            --packets-root benchmark/v0.2/annotation/review_packets \
            --strict-m1

      - name: upload proof completion dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proof-completion-dashboard-ci
          path: |
            benchmark/v0.2/annotation/review_packets/proof_completion_dashboard.json
            benchmark/v0.2/annotation/review_packets/proof_completion_dashboard.csv
            benchmark/v0.2/annotation/review_packets/wave1_proof_worklist.json
            benchmark/v0.2/annotation/review_packets/wave1_proof_worklist.csv
            benchmark/v0.2/annotation/review_packets/global_proof_worklist.json
            benchmark/v0.2/annotation/review_packets/global_proof_worklist.csv
            benchmark/v0.2/annotation/review_packets/proof_execution_plan.json
          if-no-files-found: error

      - name: cta experiment dry-run (pilot_v1)
        run: cargo run -p cta_cli --quiet -- experiment --config configs/experiments/pilot_v1.json --dry-run

      - name: cta experiment run (pilot_v1, stub provider)
        run: cargo run -p cta_cli --quiet -- experiment --config configs/experiments/pilot_v1.json

      - name: cta experiment run (pilot_all_systems_v1, stub provider, all four baselines)
        run: cargo run -p cta_cli --quiet -- experiment --config configs/experiments/pilot_all_systems_v1.json

      - name: validate generated run_manifest + results_bundle
        run: |
          set -euo pipefail
          for run in runs/run_*/; do
            if [ -f "$run/run_manifest.json" ]; then
              cargo run -p cta_cli --quiet -- validate file --schema run_manifest --path "$run/run_manifest.json"
            fi
            if [ -f "$run/results_bundle.json" ]; then
              cargo run -p cta_cli --quiet -- validate file --schema results_bundle --path "$run/results_bundle.json"
            fi
          done

      - name: assert all four baselines produced outputs (pilot_all_systems_v1)
        run: |
          set -euo pipefail
          summary_dir="runs/experiments/pilot_all_systems_v1"
          if [ ! -d "$summary_dir" ]; then
            echo "::error::$summary_dir missing; pilot_all_systems_v1 did not run"
            exit 1
          fi
          for sys in text_only_v1 code_only_v1 naive_concat_v1 full_method_v1; do
            count=$(find runs -type d -name "$sys" -path "runs/run_*/generated/*" 2>/dev/null | wc -l)
            if [ "$count" -lt 1 ]; then
              echo "::error::baseline $sys produced no generated/ directory"
              exit 1
            fi
          done

      - name: paper reviewer readiness (row counts, schemas, denylist)
        run: python3 scripts/ci_reviewer_readiness.py

      - name: human strict agreement (recompute + invariant gate)
        run: |
          python3 scripts/compute_human_strict_agreement.py \
            --packet-map annotation/human_pass_v3/human_strict_packet_ids.csv \
            --rater-a annotation/rater_a_strict_all.csv \
            --rater-b annotation/human_pass_v3/rater_b_human_strict_all.csv \
            --out-json annotation/human_pass_v3/agreement_report_human_strict_all.json \
            --out-md annotation/human_pass_v3/agreement_report_human_strict_all.md \
            --out-disagreements annotation/human_pass_v3/disagreement_log_strict_all.csv

      - name: paper claim sources (strict vs expanded)
        run: python3 scripts/check_paper_claim_sources.py

  lean:
    name: lean (scaffold compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache lake artifacts
        uses: actions/cache@v4
        with:
          path: |
            lean/.lake
            lean/build
          key: lake-${{ runner.os }}-${{ hashFiles('lean/lean-toolchain', 'lean/lakefile.lean') }}

      - name: lake build
        working-directory: lean
        run: lake build
