name: benchmark-lint

on:
  push:
    branches: [main]
    paths:
      - "benchmark/**"
      - "schemas/**"
      - "crates/cta_benchmark/**"
      - "crates/cta_schema/**"
      - ".github/workflows/benchmark-lint.yml"
  pull_request:
    branches: [main]
    paths:
      - "benchmark/**"
      - "schemas/**"
      - "crates/cta_benchmark/**"
      - "crates/cta_schema/**"
      - ".github/workflows/benchmark-lint.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: benchmark lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"

      - uses: Swatinem/rust-cache@v2

      - name: validate schemas
        run: cargo run -p cta_cli --quiet -- validate schemas

      - name: validate benchmark v0.1
        run: cargo run -p cta_cli --quiet -- validate benchmark --version v0.1

      - name: benchmark lint v0.1
        run: cargo run -p cta_cli --quiet -- benchmark lint --version v0.1 --json
