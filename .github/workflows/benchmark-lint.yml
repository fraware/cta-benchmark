name: benchmark-lint

on:
  push:
    branches: [main]
    paths:
      - "benchmark/**"
      - "schemas/**"
      - "crates/cta_benchmark/**"
      - "crates/cta_schema/**"
      - ".github/workflows/benchmark-lint.yml"
  pull_request:
    branches: [main]
    paths:
      - "benchmark/**"
      - "schemas/**"
      - "crates/cta_benchmark/**"
      - "crates/cta_schema/**"
      - ".github/workflows/benchmark-lint.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: benchmark lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"

      - uses: Swatinem/rust-cache@v2

      - name: validate schemas
        run: cargo run -p cta_cli --quiet -- validate schemas

      - name: validate benchmark v0.1
        run: cargo run -p cta_cli --quiet -- validate benchmark --version v0.1 --release

      - name: benchmark lint v0.1 (per-instance)
        run: cargo run -p cta_cli --quiet -- benchmark lint --version v0.1 --json

      - name: benchmark lint v0.1 (release coherence)
        run: cargo run -p cta_cli --quiet -- benchmark lint --version v0.1 --release --json

      - name: benchmark lint v0.1 (authoring heuristics, strict)
        run: cargo run -p cta_cli --quiet -- benchmark lint --version v0.1 --strict-authoring --json

      - name: refresh lean-check v0.2 (strict M1 gate)
        run: |
          cargo run -p cta_cli --quiet -- annotate refresh-lean-check \
            --benchmark-version v0.2 \
            --packets-root benchmark/v0.2/annotation/review_packets \
            --strict-m1

      - name: upload proof completion dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proof-completion-dashboard-benchmark-lint
          path: |
            benchmark/v0.2/annotation/review_packets/proof_completion_dashboard.json
            benchmark/v0.2/annotation/review_packets/proof_completion_dashboard.csv
            benchmark/v0.2/annotation/review_packets/wave1_proof_worklist.json
            benchmark/v0.2/annotation/review_packets/wave1_proof_worklist.csv
            benchmark/v0.2/annotation/review_packets/global_proof_worklist.json
            benchmark/v0.2/annotation/review_packets/global_proof_worklist.csv
            benchmark/v0.2/annotation/review_packets/proof_execution_plan.json
          if-no-files-found: error
